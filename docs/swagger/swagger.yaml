host: localhost:8080
info:
  contact: {}
  description: HRM API for Exnodes — see /docs/superpowers/specs/2026-05-15-go-migration-design.md
    for the migration plan.
  title: Exnodes HRM API
  version: 0.1.0
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 'Exchanges an email + password for a token pair. Required permission:
        auth:login.'
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-github_com_exnodes_hrm-api_internal_dto_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
      summary: Authenticate and receive access + refresh tokens
      tags:
      - Authentication
  /api/v1/auth/logout:
    post:
      description: Stateless logout — the client must discard its tokens.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-github_com_exnodes_hrm-api_internal_dto_LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
      security:
      - BearerAuth: []
      summary: Acknowledge logout
      tags:
      - Authentication
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-github_com_exnodes_hrm-api_internal_dto_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
      summary: Exchange a refresh token for a new token pair
      tags:
      - Authentication
  /api/v1/roles/permissions:
    get:
      description: Returns the structured permission catalog. Requires authentication
        only (no specific permission).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-array_github_com_exnodes_hrm-api_internal_permissions_PermissionGroup'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
      security:
      - BearerAuth: []
      summary: List grouped permissions (for the role-creation picker)
      tags:
      - Roles
  /health:
    get:
      description: 'Returns {success: true, data: {status: "ok"}} when the server
        is up.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-internal_handlers_HealthData'
      summary: Liveness probe
      tags:
      - system
schemes:
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
