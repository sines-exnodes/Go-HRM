    delete:
      description: |-
        Soft-deletes a skill. Returns 409 with employee_count
        in details if any live employee is still assigned.
      parameters:
      - description: Skill UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete skill (admin)
