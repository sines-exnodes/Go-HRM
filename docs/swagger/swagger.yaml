      parameters:
      - description: Skill name (1..100, regex [a-zA-Z0-9 &.+#/()-])
        in: formData
        name: name
        required: true
        type: string
      - description: Skill description (<=500)
        in: formData
        name: description
        type: string
      - description: Optional icon (image, <=5MB)
        in: formData
        name: icon
        type: file
