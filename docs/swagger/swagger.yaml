      - skills
    get:
      parameters:
      - description: Skill UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get skill by ID
      tags:
      - skills
    patch:
      consumes:
      - multipart/form-data
      description: |-
        Multipart PATCH. Omitted text fields are left alone; an
        uploaded `icon` replaces the previous icon and the old
        object is best-effort deleted from storage.
      parameters:
      - description: Skill UUID
        in: path
        name: id
        required: true
        type: string
      - description: New name
        in: formData
        name: name
        type: string
      - description: New description
        in: formData
        name: description
        type: string
      - description: New icon (image, <=5MB)
        in: formData
        name: icon
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update skill (admin)
      tags:
      - skills
