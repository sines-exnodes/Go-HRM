host: localhost:8080
info:
  contact: {}
  description: HRM API for Exnodes — see /docs/superpowers/specs/2026-05-15-go-migration-design.md
    for the migration plan.
  title: Exnodes HRM API
  version: 0.1.0
paths:
  /api/v1/announcement-labels:
    get:
      description: Returns every live label sorted by name ASC (no pagination).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List announcement labels
      tags:
      - labels
    post:
      consumes:
      - application/json
      description: |-
        Idempotent. Case-insensitive lookup: returns the existing
        label with HTTP 200 if one matches, otherwise inserts and
        returns the new row with HTTP 201.
      parameters:
      - description: Label name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.LabelCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get-or-create an announcement label by name
      tags:
      - labels
  /api/v1/announcements:
    get:
      description: Non-admins see only rows that satisfy the visibility predicate
        (published + audience match OR author). Admins see all.
      parameters:
      - description: page
        in: query
        name: page
        type: integer
      - description: page size
        in: query
        name: page_size
        type: integer
      - description: title/description search
        in: query
        name: search
        type: string
      - description: draft|scheduled|published|archived
        in: query
        name: status
        type: string
      - description: label UUID
        in: query
        name: label_id
        type: string
      - description: filter by pinned
        in: query
        name: pinned
        type: boolean
      - description: all|mine|targeted-at-me
        in: query
        name: scope
        type: string
      - description: department UUID (admin)
        in: query
        name: department_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List announcements (web)
      tags:
      - announcements
    post:
      consumes:
      - application/json
      description: |-
        Saved as draft by default. Pass `status: "published"` in the
        body to publish immediately (broadcasts via SSE). The Python-
        parity shortcut `send_now: true` also works — when set and
        `status` is not explicitly provided, the row is created
        already published. Explicit `status` always wins.

        `target_audience` accepts `all`, `department`, or `custom`.
        `department` requires at least one `department_ids` entry;
        `custom` requires at least one `recipient_ids` entry
        (employee_ids).
      parameters:
      - description: create payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.AnnouncementCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create an announcement
      tags:
      - announcements
  /api/v1/announcements/{id}:
    delete:
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Soft-delete an announcement (owner or admin)
      tags:
      - announcements
    get:
      description: Returns 403 when the caller cannot see this row per the visibility
        predicate.
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get an announcement by ID
      tags:
      - announcements
    patch:
      consumes:
      - application/json
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      - description: patch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.AnnouncementUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "409":
          description: announcement is published or archived
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update an announcement (owner or admin)
      tags:
      - announcements
  /api/v1/announcements/{id}/publish:
    post:
      description: Stamps published_at + broadcasts via SSE. No-op if already published.
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Publish an announcement
      tags:
      - announcements
  /api/v1/announcements/{id}/view:
    post:
      description: Records a per-user read marker. Second call is a no-op (preserves
        the first view time).
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Mark an announcement as viewed (idempotent)
      tags:
      - announcements
  /api/v1/attendance:
    get:
      description: Managers see all employees; non-managers see only their own row.
      parameters:
      - description: 1-12
        in: query
        name: month
        type: integer
      - description: YYYY
        in: query
        name: year
        type: integer
      - description: page
        in: query
        name: page
        type: integer
      - description: page size
        in: query
        name: page_size
        type: integer
      - description: name filter (managers only)
        in: query
        name: search
        type: string
      - description: department UUID (managers only)
        in: query
        name: department_id
        type: string
      - description: 'CSV: on_time,late,absent,weekend,no_data'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 'Monthly attendance matrix (managers: all employees; others: own row)'
      tags:
      - attendance
    post:
      consumes:
      - application/json
      parameters:
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.AttendanceAdminCreateReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Admin manual create of an attendance row
      tags:
      - attendance
  /api/v1/attendance/{id}:
    delete:
      parameters:
      - description: attendance uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Admin soft-delete of an attendance row
      tags:
      - attendance
    get:
      parameters:
      - description: attendance uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get an attendance row by ID (owner or admin)
      tags:
      - attendance
    patch:
      consumes:
      - application/json
      parameters:
      - description: attendance uuid
        in: path
        name: id
        required: true
        type: string
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.AttendanceAdminUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Admin update of an attendance row
      tags:
      - attendance
  /api/v1/attendance/auto-checkout:
    post:
      description: Idempotent. Defaults the cutoff to now (company TZ) when omitted.
      parameters:
      - description: RFC3339 cutoff; defaults to now
        in: query
        name: cutoff
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 'Admin: close all open sessions before a cutoff (auto check-out)'
      tags:
      - attendance
