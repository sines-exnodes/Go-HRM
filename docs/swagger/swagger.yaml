      is_active:
        type: boolean
      join_date:
        type: string
      last_name:
        maxLength: 100
        minLength: 1
        type: string
      manager_id:
        type: string
      marital_status:
        enum:
        - single
        - married
        - other
        type: string
      nationality:
        type: string
      payment_method:
        type: string
      permanent_address:
        type: string
      personal_email:
        type: string
      phone:
        type: string
      position_id:
        type: string
      role_ids:
        description: Roles assigned at creation
        items:
          type: string
        type: array
      send_invite:
        description: |-
          When true, a "set your password" email is sent to the new employee using
          the same forgot-password token mechanism (PasswordResetService.RequestReset).
        type: boolean
      skill_ids:
        description: Skills assigned at creation (inline — Python parity). Empty/absent
          = none.
        items:
          type: string
        type: array
      social_insurance_number:
        maxLength: 50
        type: string
      tax_identification_number:
        maxLength: 50
        type: string
    required:
    - email
    - first_name
    - last_name
    type: object
