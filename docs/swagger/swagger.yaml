      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
        "400":
          description: Malformed body
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
      summary: Request a password reset email
      tags:
      - Authentication
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Exchanges an email + password for a token pair. Required permission: `auth:login`.

        **Brute-force protection.** After `MAX_FAILED_LOGIN_ATTEMPTS` (default 5)
        consecutive bad passwords the account is locked for `ACCOUNT_LOCKOUT_MINUTES`
        (default 15). During the lockout window, every login attempt — including the
        correct one — returns 401 with `"Account temporarily locked. Try again in N minutes."`.
        A successful login resets the failed-attempt counter.

        **`remember_me`.** When `true`, the refresh token is issued with the long-lived
        TTL (`REMEMBER_ME_REFRESH_TOKEN_EXPIRE_DAYS`, default 30 days) instead of the
        default refresh-token TTL. The access token TTL is unaffected.

        **`is_active`.** A deactivated account is rejected with 401 *after* password
        verification so the response cannot be used to enumerate which accounts exist.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-github_com_exnodes_hrm-api_internal_dto_LoginResponse'
        "400":
          description: Malformed body
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
        "401":
          description: Invalid credentials, account deactivated, or temporarily locked
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
        "403":
          description: Missing auth:login permission
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
      summary: Authenticate and receive access + refresh tokens
      tags:
      - Authentication
  /api/v1/auth/logout:
    post:
      description: Stateless logout — the client must discard its tokens.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-github_com_exnodes_hrm-api_internal_dto_LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.Response-any'
      security:
      - BearerAuth: []
      summary: Acknowledge logout
