basePath: /
definitions:
  github_com_exnodes_hrm-api_internal_dto.EmployeeSummary:
    properties:
      avatar_url:
        type: string
      department_id:
        type: string
      full_name:
        type: string
      id:
        type: string
      manager_id:
        type: string
      position_id:
        type: string
    type: object
  github_com_exnodes_hrm-api_internal_dto.LoginRequest:
    properties:
      email:
        example: admin@exnodes.vn
        type: string
      password:
        example: ChangeMe!2026
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  github_com_exnodes_hrm-api_internal_dto.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        example: Bearer
        type: string
      user:
        $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.UserSummary'
    type: object
  github_com_exnodes_hrm-api_internal_dto.LogoutResponse:
    properties:
      message:
        example: Logged out
        type: string
    type: object
  github_com_exnodes_hrm-api_internal_dto.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOi...
        type: string
    required:
    - refresh_token
    type: object
  github_com_exnodes_hrm-api_internal_dto.Response-any:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_exnodes_hrm-api_internal_dto.Response-array_github_com_exnodes_hrm-api_internal_permissions_PermissionGroup:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_permissions.PermissionGroup'
        type: array
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_exnodes_hrm-api_internal_dto.Response-github_com_exnodes_hrm-api_internal_dto_LoginResponse:
    properties:
      data:
        $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.LoginResponse'
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_exnodes_hrm-api_internal_dto.Response-github_com_exnodes_hrm-api_internal_dto_LogoutResponse:
    properties:
      data:
        $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.LogoutResponse'
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_exnodes_hrm-api_internal_dto.Response-internal_handlers_HealthData:
    properties:
      data:
        $ref: '#/definitions/internal_handlers.HealthData'
