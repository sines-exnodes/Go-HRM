        param (EventSource cannot set headers — REVISION NOTES #9). Sends a `: keepalive`
        comment every 30s to keep proxies from closing idle connections.'
      parameters:
      - description: JWT access token (alternative to Authorization header)
        in: query
        name: token
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: event stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
