host: localhost:8080
info:
  contact: {}
  description: HRM API for Exnodes — see /docs/superpowers/specs/2026-05-15-go-migration-design.md
    for the migration plan.
  title: Exnodes HRM API
  version: 0.1.0
paths:
  /api/v1/announcement-labels:
    get:
      description: Returns every live label sorted by name ASC (no pagination).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List announcement labels
      tags:
      - labels
    post:
      consumes:
      - application/json
      description: |-
        Idempotent. Case-insensitive lookup: returns the existing
        label with HTTP 200 if one matches, otherwise inserts and
        returns the new row with HTTP 201.
      parameters:
      - description: Label name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.LabelCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get-or-create an announcement label by name
      tags:
      - labels
  /api/v1/announcements:
    get:
      description: Non-admins see only rows that satisfy the visibility predicate
        (published + audience match OR author). Admins see all.
      parameters:
      - description: page
        in: query
        name: page
        type: integer
      - description: page size
        in: query
        name: page_size
        type: integer
      - description: title/body search
        in: query
        name: search
        type: string
      - description: draft|scheduled|published|archived
        in: query
        name: status
        type: string
      - description: label UUID
        in: query
        name: label_id
        type: string
      - description: filter by pinned
        in: query
        name: pinned
        type: boolean
      - description: all|mine|targeted-at-me
        in: query
        name: scope
        type: string
      - description: department UUID (admin)
        in: query
        name: department_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List announcements (web)
      tags:
      - announcements
    post:
      consumes:
      - application/json
      description: Saved as draft by default. Pass status=published in the body to
        publish immediately (broadcasts via SSE).
      parameters:
      - description: create payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.AnnouncementCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create an announcement
      tags:
      - announcements
  /api/v1/announcements/{id}:
    delete:
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Soft-delete an announcement (owner or admin)
      tags:
      - announcements
    get:
      description: Returns 403 when the caller cannot see this row per the visibility
        predicate.
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get an announcement by ID
      tags:
      - announcements
    patch:
      consumes:
      - application/json
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      - description: patch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.AnnouncementUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update an announcement (owner or admin)
      tags:
      - announcements
  /api/v1/announcements/{id}/publish:
    post:
      description: Stamps published_at + broadcasts via SSE. No-op if already published.
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Publish an announcement
      tags:
      - announcements
  /api/v1/announcements/{id}/view:
    post:
      description: Records a per-user read marker. Second call is a no-op (preserves
        the first view time).
      parameters:
      - description: announcement uuid
        in: path
        name: id
        required: true
