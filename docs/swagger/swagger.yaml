      cv_url:
        type: string
      department_id:
        description: Work
        type: string
      dob:
        type: string
      education:
        enum:
        - high_school
        - college
        - bachelor
        - master
        - doctorate
        type: string
      email:
        description: |-
          User credentials (created in tx).
          Password is intentionally not accepted from the HTTP payload (json:"-") —
          it must be set via the forgot-password / invite-accept flow after creation,
          matching Python's passwordless admin-create behaviour.
          InviteService.Accept populates this field in Go code before calling
          empSvc.Create, so invite-based accounts still get a password on first use.
        type: string
      emergency_contacts:
        description: 'Emergency contacts — full replacement list at create (employees
          parity #4).'
        items:
          $ref: '#/definitions/github_com_exnodes_hrm-api_internal_dto.EmergencyContactInput'
        type: array
      experience_year:
        description: career-start year; range validated in the service (validateExperienceYear)
        type: integer
      first_name:
        description: HR personal info
        maxLength: 100
        minLength: 1
        type: string
      gender:
        enum:
        - male
        - female
        - other
        type: string
      id_back_image:
        type: string
      id_front_image:
        type: string
      id_issue_date:
        type: string
      id_number:
        type: string
