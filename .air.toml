# Air hot-reload config used by docker-compose.dev.yml.
# Docs: https://github.com/air-verse/air

root    = "."
tmp_dir = ".air-tmp"

[build]
  # Apply migrations before each rebuild. `|| true` keeps Air alive on the
  # first run when postgres may still be starting; the next rebuild retries.
  pre_cmd      = ["sh -c 'migrate -path ./migrations -database \"$DATABASE_URL\" up || true'"]
  cmd          = "go build -o ./.air-tmp/server ./cmd/server"
  bin          = "./.air-tmp/server"
  include_ext  = ["go"]
  exclude_dir  = ["bin", ".air-tmp", "docs", "migrations", ".git", ".claude", ".serena", "tmp", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  delay        = 500
  stop_on_root = false

[log]
  time = true

[misc]
  clean_on_exit = true
